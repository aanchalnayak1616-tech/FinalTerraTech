<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Rate | AgriPredict</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .module-card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background: #2ecc71; border: none; }
        .btn-primary:hover { background: #27ae60; }
        .nav-link.active { color: #2ecc71 !important; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">AgriPredict</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link active" href="/growth">Growth Rate</a>
            <a class="nav-link" href="/market">Market</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="text-center mb-5">
        <h1 class="fw-bold">📈 Farm Performance Analytics</h1>
        <p class="text-muted">Track your productivity and market profit trends over time.</p>
        <button onclick="clearAllData()" class="btn btn-outline-danger btn-sm rounded-pill px-4">
        🗑️ Clear All Analytics Data
    </button>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card module-card p-4 h-100">
                <h4 class="mb-3">🌾 Productivity Increase</h4>
                <p class="small text-muted">Measure efficiency: Total Yield / Total Acres</p>
                <div class="row g-2 mb-3">
                    <div class="col-6"><input type="number" id="yield" class="form-control" placeholder="Yield (kg)"></div>
                    <div class="col-6"><input type="number" id="acres" class="form-control" placeholder="Area (Acres)"></div>
                </div>
                <button onclick="addProdData()" class="btn btn-primary w-100">Record Data Point</button>
                <div class="mt-4" style="height: 300px;">
                    <canvas id="prodChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card module-card p-4 h-100">
                <h4 class="mb-3">💰 Profit Rate Analytics</h4>
                <p class="small text-muted">Track inflation: Selling Price vs Cost Price</p>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold">Select Crop to Auto-fill Cost</label>
                    <div class="input-group">
                        <select id="profit-crop-select" class="form-select">
                            <option value="">-- Choose Crop --</option>
                            <option value="rice">Rice (Paddy)</option>
                            <option value="wheat">Wheat</option>
                            <option value="maize">Maize</option>
                            <option value="cotton">Cotton</option>
                            <option value="groundnut">Groundnut</option>
                            <option value="onion">Onion</option>
                            <option value="potato">Potato</option>
                        </select>
                        <button class="btn btn-outline-secondary" type="button" onclick="autoFetchCost()">Detect Cost</button>
                    </div>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small">Selling Price/kg</label>
                        <input type="number" id="sell" class="form-control" placeholder="Price">
                    </div>
                    <div class="col-6">
                        <label class="form-label small">Cost Price/kg</label>
                        <input type="number" id="cost" class="form-control" placeholder="Cost">
                    </div>
                </div>
                <button onclick="addProfitData()" class="btn btn-success w-100">Calculate & Plot</button>
                <div class="mt-4" style="height: 300px;">
                    <canvas id="profitChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Production Cost Data (Add this first)
    const indianCropCosts = {
        "rice": 16.50,
        "wheat": 15.10,
        "maize": 14.80,
        "cotton": 49.50,
        "groundnut": 48.40,
        "onion": 12.00,
        "potato": 9.50
    };

    // 2. The Auto-fill Function (Add this second)
    function autoFetchCost() {
        const selectedCrop = document.getElementById('profit-crop-select').value;
        const costInput = document.getElementById('cost'); 
        
        if (selectedCrop && indianCropCosts[selectedCrop]) {
            costInput.value = indianCropCosts[selectedCrop];
            costInput.style.backgroundColor = "#dcfce7"; 
            setTimeout(() => costInput.style.backgroundColor = "", 600);
        } else {
            alert("Please select a crop first!");
        }
    }

    // 3. Productivity Chart Setup
    let prodLabels = [];
    let prodValues = [];
    const ctx1 = document.getElementById('prodChart').getContext('2d');
    const prodChart = new Chart(ctx1, {
        type: 'line',
        data: { labels: prodLabels, datasets: [{ label: 'Productivity (kg/Acre)', data: prodValues, borderColor: '#2ecc71', tension: 0.3, fill: true, backgroundColor: 'rgba(46, 204, 113, 0.1)' }]},
        options: { maintainAspectRatio: false }
    });

    function addProdData() {
        let y = document.getElementById('yield').value;
        let a = document.getElementById('acres').value;
        if(y && a) {
            let res = y / a;
            prodLabels.push("Entry " + (prodLabels.length + 1));
            prodValues.push(res);
            prodChart.update();
            document.getElementById('yield').value = '';
        }
    }

    // 4. Profit Chart Setup
    let profitLabels = [];
    let profitValues = [];
    const ctx2 = document.getElementById('profitChart').getContext('2d');
    const profitChart = new Chart(ctx2, {
        type: 'line',
        data: { labels: profitLabels, datasets: [{ label: 'Net Profit/kg (₹)', data: profitValues, borderColor: '#f1c40f', tension: 0.3, fill: true, backgroundColor: 'rgba(241, 196, 15, 0.1)' }]},
        options: { maintainAspectRatio: false }
    });

    function addProfitData() {
        let s = document.getElementById('sell').value;
        let c = document.getElementById('cost').value;
        if(s && c) {
            let res = s - c;
            profitLabels.push("Record " + (profitLabels.length + 1));
            profitValues.push(res);
            profitChart.update();
            document.getElementById('sell').value = '';
        }
    }

    function clearAllData() {
    if (confirm("Are you sure you want to wipe all graph data?")) {
        // 1. Clear Productivity Data
        prodLabels.length = 0;
        prodValues.length = 0;
        prodChart.update();

        // 2. Clear Profit Data
        profitLabels.length = 0;
        profitValues.length = 0;
        profitChart.update();

        // 3. Reset all Input fields
        document.getElementById('yield').value = '';
        document.getElementById('acres').value = '';
        document.getElementById('sell').value = '';
        document.getElementById('cost').value = '';
        document.getElementById('profit-crop-select').value = '';
        
        // Visual feedback
        alert("Data cleared successfully!");
    }
}

</script>
</body>
</html>
