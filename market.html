<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agri Market Pro 🌱</title>

<style>
body {
  font-family: 'Quicksand', sans-serif;
  margin: 0;
  background: #f8fafc;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  font-size: 22px;
  font-weight: 700;
}

.cart {
  font-size: 16px;
}

/* FILTER */
.filter-bar {
  display: flex;
  gap: 10px;
  padding: 20px;
  justify-content: center;
}

.filter-btn {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #e2e8f0;
}

.filter-btn.active {
  background: #22c55e;
  color: white;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  padding: 30px;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 180px;
  border-radius: 12px;
  object-fit: cover;
}

.title {
  font-weight: 700;
  margin: 10px 0;
}

.price {
  color: #16a34a;
  font-weight: 800;
}

.btn {
  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  width: 100%;
}

.buy { background: #22c55e; color: white; }
.compare { background: #e2e8f0; }

/* COMPARE MODAL */
.modal {
  position: fixed;
  top: 20%;
  left: 30%;
  width: 40%;
  background: white;
  padding: 20px;
  border-radius: 16px;
  display: none;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="header">
  <div style="padding:15px; text-align:center;">
  <input 
    placeholder="Search products..." 
    onkeyup="searchProducts(this.value)"
    style="
      width:60%;
      padding:12px;
      border-radius:10px;
      border:none;
      outline:none;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    "
  >
</div>
  🌱 Agri Market Pro

  <div>
    <span onclick="openCart()" style="cursor:pointer;">
  🛒 Cart: <span id="cartCount">0</span>
</span>
    <button style="margin-left:10px; padding:6px 12px; border-radius:8px; border:none; background:white; cursor:pointer;" onclick="openCheckout()">
  Checkout
</button>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterProducts('all')">All</button>
  <button class="filter-btn" onclick="filterProducts('fertilizer')">Fertilizers</button>
  <button class="filter-btn" onclick="filterProducts('pesticide')">Pesticides</button>
  <button class="filter-btn" onclick="filterProducts('tools')">Tools</button>
</div>


<div class="products" id="productContainer"></div>
<div class="modal" id="compareModal"></div>

<script>
let products = [
  {id:1, name:"Organic Fertilizer", price:450, type:"fertilizer", img:"https://images.unsplash.com/photo-1589927986089-35812388d1f4"},
  {id:2, name:"Pesticide Spray", price:320, type:"pesticide", img:"https://images.unsplash.com/photo-1598514982205-17f3c3d58a89"},
  {id:3, name:"Mini Tractor Tool", price:1200, type:"tools", img:"https://images.unsplash.com/photo-1605000797499-95a51c5269ae"},

  // NEW PRODUCTS 👇
  {id:4, name:"Urea Fertilizer", price:300, type:"fertilizer", img:"https://images.unsplash.com/photo-1625246333195-78d9c38ad449"},
  {id:5, name:"Weed Killer", price:250, type:"pesticide", img:"https://images.unsplash.com/photo-1581578731548-c64695cc6952"},
  {id:6, name:"Water Pump", price:2200, type:"tools", img:"https://images.unsplash.com/photo-1598511727333-63c7c59b1d00"}
];

let cart = [];
let compareList = [];

/* CART */
function addToCart(id){
  let product = products.find(p => p.id === id);
  cart.push(product);

  document.getElementById("cartCount").innerText = cart.length;

  localStorage.setItem("cart", JSON.stringify(cart));
}
function searchProducts(text){
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(text.toLowerCase())
      ? "block" : "none";
  });
}

/* FILTER */
function filterProducts(type){
  let cards = document.querySelectorAll(".card");
  cards.forEach(card => {
    if(type === "all" || card.dataset.type === type){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

/* COMPARE */
function addToCompare(name, price){
  compareList.push({name, price});

  if(compareList.length === 2){
    showComparison();
  }
}

function showComparison(){
  let modal = document.getElementById("compareModal");

  modal.innerHTML = `
    <h3>Product Comparison</h3>
    <p>${compareList[0].name} - ₹${compareList[0].price}</p>
    <p>${compareList[1].name} - ₹${compareList[1].price}</p>
    <button onclick="closeModal()">Close</button>
  `;

  modal.style.display = "block";
}

function closeModal(){
  document.getElementById("compareModal").style.display = "none";
  compareList = [];
}
function openCheckout(){
  document.body.innerHTML = `
    <h2>Checkout</h2>

    <h3>Delivery Address</h3>
    <input placeholder="Full Name"><br>
    <input placeholder="Phone"><br>
    <input placeholder="PIN Code"><br>
    <input placeholder="State"><br>
    <input placeholder="City"><br>
    <input placeholder="Road / Area"><br>

    <h3>Payment Method</h3>
    <select>
      <option>Cash on Delivery</option>
      <option>UPI</option>
      <option>Card</option>
    </select>

    <br><br>
    <button onclick="placeOrder()">Place Order</button>
  `;
}
window.onload = function(){
  loadProducts();

  let savedCart = localStorage.getItem("cart");
  if(savedCart){
    cart = JSON.parse(savedCart);
    document.getElementById("cartCount").innerText = cart.length;
  }
}
function loadProducts(){
  let container = document.getElementById("productContainer");
  container.innerHTML = "";

  products.forEach(p => {
    container.innerHTML += `
  <div class="card" onclick="openProduct(${p.id})" data-type="${p.type}" style="
    transition:0.3s;
    cursor:pointer;
  ">
    <img src="${p.img}">

    <div class="title">${p.name}</div>

    <div class="price">₹${p.price}</div>

    <div style="color:#facc15;">⭐⭐⭐⭐☆</div>

    <button class="btn buy" onclick="event.stopPropagation(); addToCart(${p.id})">
      🛒 Add to Cart
    </button>

    <button class="btn compare" onclick="event.stopPropagation(); addToCompare('${p.name}', ${p.price})">
      ⚖️ Compare
    </button>
  </div>
`;

    
        
  });
}
function placeOrder(){
  alert("🎉 Order Placed Successfully!");
  cart = [];
  localStorage.removeItem("cart");
  location.reload();
}
function openProduct(id){
  let p = products.find(x => x.id === id);

  document.body.innerHTML = `
    <div style="padding:30px; text-align:center;">

      <img src="${p.img}" width="300" style="border-radius:15px;">

      <h1>${p.name}</h1>
      <h2 style="color:green;">₹${p.price}</h2>

      <p>High quality agricultural product. Best for farmers 🌱</p>

      <button onclick="addToCart(${p.id})">🛒 Add to Cart</button>

      <h2>Similar Products</h2>
      <div id="similar" style="display:flex; gap:10px; justify-content:center;"></div>

      <br><br>
      <button onclick="location.reload()">⬅ Back</button>
    </div>
  `;

  let similar = products.filter(x => x.type === p.type && x.id !== p.id);

  let html = "";
  similar.forEach(s => {
    html += `
      <div style="width:120px;">
        <img src="${s.img}" width="100">
        <p>${s.name}</p>
      </div>
    `;
  });

  document.getElementById("similar").innerHTML = html;
}
function openCart(){
  let html = `
    <h2 style="text-align:center;">🛒 Your Cart</h2>
    <div style="padding:20px;">
  `;

  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;

    html += `
      <div style="
        display:flex;
        align-items:center;
        gap:15px;
        background:white;
        padding:15px;
        border-radius:12px;
        margin-bottom:10px;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
      ">
        <img src="${item.img}" width="80" style="border-radius:10px;">

        <div style="flex:1;">
          <h3>${item.name}</h3>
          <p>₹${item.price}</p>

          <button onclick="increaseQty(${index})">➕</button>
          <button onclick="decreaseQty(${index})">➖</button>
        </div>

        <button onclick="removeItem(${index})">❌</button>
      </div>
    `;
  });

  html += `
    <h2>Total: ₹${total}</h2>

    <button onclick="openCheckout()">Proceed to Checkout</button>
    <br><br>
    <button onclick="location.reload()">Back</button>
    </div>
  `;

  document.body.innerHTML = html;
}
function removeItem(index){
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  openCart();
}
function increaseQty(index){
  cart.push(cart[index]);
  localStorage.setItem("cart", JSON.stringify(cart));
  openCart();
}

function decreaseQty(index){
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  openCart();
}
</script>

</body>
</html>
